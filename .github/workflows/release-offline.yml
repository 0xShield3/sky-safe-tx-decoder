name: Release offline build

# On a version tag, build the single-file offline app and attach it (plus a
# sha256 checksum) to the GitHub Release for that tag. The hosted Cloudflare/IPFS
# deploys are separate; this only produces the double-click-to-run index.html.
on:
  push:
    tags:
      - 'v*'

# Least privilege: only what's needed to create the release and upload assets.
permissions:
  contents: write

env:
  # Don't prompt when corepack provisions the pinned pnpm.
  COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'

jobs:
  offline:
    runs-on: ubuntu-latest
    steps:
      # NOTE: for a security-critical repo, consider pinning these actions to
      # full commit SHAs rather than version tags (supply-chain hardening).
      - name: Checkout (at the tag)
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Use the pnpm version pinned in package.json's packageManager field.
      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test core
        run: pnpm --filter @shield3/sky-safe-core test

      - name: Build offline single file
        run: |
          pnpm --filter @shield3/sky-safe-core build
          pnpm --filter @shield3/sky-safe-ui build:offline

      - name: Package artifact + checksum
        run: |
          ASSET="sky-safe-tx-decoder-${GITHUB_REF_NAME}.html"
          cp packages/ui/dist-offline/index.html "$ASSET"
          sha256sum "$ASSET" > "$ASSET.sha256"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Create release and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$ASSET" "$ASSET.sha256" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
